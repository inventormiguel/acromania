<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Acromania</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #12071f;
    --card: #241238;
    --card2: #2f1a47;
    --accent: #ffb703;
    --accent2: #fb5607;
    --pink: #ff006e;
    --purple: #8338ec;
    --blue: #3a86ff;
    --green: #06d6a0;
    --text: #f4ecff;
    --muted: #a58fc4;
  }
  body {
    background: radial-gradient(1200px 800px at 50% -10%, #2b1052 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    padding-top: 54px;
  }
  h1.logo {
    font-size: 44px;
    letter-spacing: 2px;
    margin: 12px 0 4px;
    background: linear-gradient(90deg, var(--accent), var(--pink), var(--purple), var(--blue));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-transform: uppercase;
    font-weight: 800;
  }
  .tagline { color: var(--muted); margin-bottom: 20px; font-size: 14px; }
  .screen { width: 100%; max-width: 560px; display: none; flex-direction: column; gap: 14px; }
  .screen.active { display: flex; }
  .card {
    background: var(--card);
    border: 1px solid #3d2560;
    border-radius: 16px;
    padding: 18px;
  }
  input[type=text] {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 2px solid #4a2d73;
    background: #1a0c2e;
    color: var(--text);
    font-size: 17px;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--purple); }
  button {
    padding: 14px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--accent2), var(--pink));
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .08s;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: default; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  /* barra do topo: idioma + sair */
  .topbar {
    position: fixed; top: 10px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: center; z-index: 10;
  }
  .langbar { display: flex; gap: 6px; }
  .langbar button {
    padding: 6px 12px; font-size: 14px; border-radius: 20px;
    background: var(--card2); border: 1px solid #4a2d73; color: var(--muted);
  }
  .langbar button.active {
    background: linear-gradient(90deg, var(--purple), var(--blue));
    color: #fff; border-color: transparent;
  }
  .langbar.locked button { opacity: .55; cursor: not-allowed; }
  #btn-leave {
    padding: 6px 12px; font-size: 14px; border-radius: 20px;
    background: var(--card2); border: 1px solid #4a2d73; color: var(--muted);
    display: none;
  }
  #btn-leave.show { display: block; }
  .conn { font-size: 12px; color: var(--pink); display: none; margin-right: 10px; }
  .conn.show { display: inline; }

  /* header de rodada */
  .roundbar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; color: var(--muted);
  }
  .timer {
    font-size: 26px; font-weight: 800; color: var(--accent);
    min-width: 54px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .timer.urgent { color: var(--pink); animation: pulse .5s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

  .theme {
    font-size: 20px; font-weight: 700; text-align: center; line-height: 1.35;
  }
  .letters { display: flex; justify-content: center; gap: 10px; margin: 8px 0; flex-wrap: wrap; }
  .letter {
    width: 54px; height: 54px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; color: #12071f;
    box-shadow: 0 4px 0 rgba(0,0,0,.35);
  }
  .letter:nth-child(5n+1) { background: var(--accent); }
  .letter:nth-child(5n+2) { background: var(--pink); color: #fff; }
  .letter:nth-child(5n+3) { background: var(--green); }
  .letter:nth-child(5n+4) { background: var(--blue); color: #fff; }
  .letter:nth-child(5n+5) { background: var(--purple); color: #fff; }
  .letter.ok { outline: 3px solid var(--green); }
  .letter.bad { outline: 3px solid var(--pink); }

  .hint { font-size: 13px; color: var(--muted); text-align: center; }
  .error {
    background: #4a1030; border: 1px solid var(--pink); color: #ffb3d1;
    border-radius: 10px; padding: 10px 14px; font-size: 14px; display: none;
    margin-top: 8px;
  }
  .error.show { display: block; }
  .waiting { text-align: center; color: var(--green); font-weight: 700; font-size: 16px; }
  .spect {
    text-align: center; color: var(--accent); font-weight: 700; font-size: 15px;
    background: #3a250e; border: 1px dashed var(--accent); border-radius: 12px; padding: 12px;
  }

  /* votação */
  .entry {
    background: var(--card2); border: 2px solid #4a2d73; border-radius: 14px;
    padding: 16px; font-size: 17px; cursor: pointer; transition: border-color .15s, transform .08s;
    line-height: 1.4;
  }
  .entry:active { transform: scale(.98); }
  .entry.mine, .entry.locked { opacity: .55; cursor: default; border-style: dashed; }
  .entry.voted { border-color: var(--green); background: #14382f; }
  .entry .tag { font-size: 12px; color: var(--muted); display: block; margin-top: 6px; }

  /* resultados */
  .result {
    background: var(--card2); border-radius: 14px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .result .phrase { font-size: 17px; font-weight: 600; line-height: 1.35; }
  .result .meta { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); }
  .result .pts { color: var(--accent); font-weight: 800; }
  .result.winner { border: 2px solid var(--accent); }
  .result.winner .phrase::before { content: '👑 '; }

  /* placar e ranking */
  .board { display: flex; flex-direction: column; gap: 8px; }
  .prow {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card2); border-radius: 10px; padding: 10px 14px; font-size: 15px;
  }
  .prow .status { font-size: 12px; color: var(--green); margin-left: 8px; }
  .prow .wait { font-size: 12px; color: var(--accent); margin-left: 8px; }
  .prow .score { font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
  .prow.me { border: 1px solid var(--purple); }
  .prow .pos { color: var(--muted); margin-right: 8px; min-width: 24px; display: inline-block; }
  .prow .wins { font-size: 12px; color: var(--muted); margin-left: 8px; }

  /* pódio */
  .podium { text-align: center; }
  .champion { font-size: 30px; font-weight: 800; color: var(--accent); margin: 10px 0; }
  .confetti { font-size: 40px; }

  .section-title {
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 8px;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="langbar" id="langbar">
      <button id="lang-pt">🇧🇷 PT</button>
      <button id="lang-en">🇺🇸 EN</button>
    </div>
    <div>
      <span class="conn" id="conn"></span>
      <button id="btn-leave"></button>
    </div>
  </div>
  <h1 class="logo">Acromania</h1>
  <div class="tagline" data-i18n="tagline"></div>

  <!-- JOIN -->
  <div class="screen active" id="s-join">
    <div class="card">
      <div class="section-title" data-i18n="askName"></div>
      <div class="row">
        <input type="text" id="name" maxlength="20" autocomplete="off">
        <button id="btn-join" style="flex:0 0 auto" data-i18n="join"></button>
      </div>
      <div class="hint" style="margin-top:10px" data-i18n="roomHint"></div>
      <div class="error" id="err-join"></div>
    </div>
  </div>

  <!-- LOBBY -->
  <div class="screen" id="s-lobby">
    <div class="card">
      <div class="section-title" data-i18n="lobbyTitle"></div>
      <div class="board" id="lobby-players"></div>
    </div>
    <button id="btn-start"></button>
    <div class="hint" data-i18n="shareHint"></div>
    <div class="error" id="err-lobby"></div>
    <div class="card">
      <div class="section-title" data-i18n="rankingTitle"></div>
      <div class="board" id="lobby-ranking"></div>
    </div>
  </div>

  <!-- ESCRITA -->
  <div class="screen" id="s-writing">
    <div class="card">
      <div class="roundbar">
        <span id="w-round"></span>
        <span class="timer" id="w-timer"></span>
      </div>
      <div class="theme" id="w-theme"></div>
      <div class="letters" id="w-letters"></div>
      <div id="w-form">
        <input type="text" id="phrase" maxlength="120" autocomplete="off">
        <div class="hint" style="margin:8px 0" data-i18n="orderHint"></div>
        <button id="btn-submit" style="width:100%" data-i18n="submit"></button>
        <div class="error" id="err-write"></div>
      </div>
      <div class="waiting" id="w-waiting" style="display:none" data-i18n="sent"></div>
      <div class="spect" id="w-spect" style="display:none" data-i18n="spectNotice"></div>
    </div>
    <div class="card">
      <div class="section-title" data-i18n="playersTitle"></div>
      <div class="board" id="w-players"></div>
    </div>
  </div>

  <!-- VOTAÇÃO -->
  <div class="screen" id="s-voting">
    <div class="card">
      <div class="roundbar">
        <span id="v-round"></span>
        <span class="timer" id="v-timer"></span>
      </div>
      <div class="theme" id="v-theme"></div>
      <div class="hint" style="margin-top:6px" id="v-hint"></div>
    </div>
    <div id="v-entries" style="display:flex;flex-direction:column;gap:10px"></div>
    <div class="error" id="err-vote"></div>
  </div>

  <!-- RESULTADOS -->
  <div class="screen" id="s-results">
    <div class="card">
      <div class="roundbar">
        <span id="r-round"></span>
        <span class="timer" id="r-timer"></span>
      </div>
      <div class="theme" id="r-theme"></div>
    </div>
    <div id="r-entries" style="display:flex;flex-direction:column;gap:10px"></div>
    <div class="card">
      <div class="section-title" data-i18n="scoreTitle"></div>
      <div class="board" id="r-players"></div>
    </div>
  </div>

  <!-- FINAL -->
  <div class="screen" id="s-final">
    <div class="card podium">
      <div class="confetti">🎉🏆🎉</div>
      <div class="section-title" data-i18n="championTitle"></div>
      <div class="champion" id="f-champion"></div>
      <div class="board" id="f-board" style="text-align:left;margin-top:14px"></div>
      <div class="hint" style="margin-top:14px"><span data-i18n="backLobby"></span> <span id="f-timer"></span></div>
    </div>
    <div class="card">
      <div class="section-title" data-i18n="rankingTitle"></div>
      <div class="board" id="f-ranking"></div>
    </div>
  </div>

<script>
// ------------------------------------------------------------------ i18n
const I18N = {
  pt: {
    tagline: 'tema + letras sorteadas → a frase mais criativa vence',
    askName: 'Como você quer ser chamado?',
    namePh: 'Seu nome',
    join: 'Entrar',
    roomHint: '🇧🇷 Você vai entrar na sala em português — troca o idioma lá em cima antes de entrar.',
    roomHintEn: '🇺🇸 You are joining the English room — switch the language up top before joining.',
    lobbyTitle: 'Sala de espera',
    start: 'Começar torneio (5 rodadas)',
    waitingPlayers: 'Esperando mais jogadores… (mínimo 2)',
    shareHint: 'Compartilha o link com a galera — dá pra entrar até no meio da partida.',
    round: 'Rodada {r} de {t}',
    roundVoting: 'Rodada {r} de {t} — votação',
    roundResults: 'Rodada {r} de {t} — resultado',
    phrasePh: 'Escreve tua frase aqui…',
    orderHint: 'Cada palavra começa com a letra na ordem',
    submit: 'Enviar frase',
    sent: '✅ Frase enviada! Esperando os outros…',
    playersTitle: 'Jogadores',
    voteHint: 'Vota na melhor frase (na sua não vale 😄)',
    yours: 'essa é a sua 😉',
    yourVote: 'seu voto ✅',
    by: 'por',
    vote1: 'voto',
    voteN: 'votos',
    scoreTitle: 'Placar',
    nobody: '😴 Ninguém enviou frase nessa rodada…',
    championTitle: 'Campeão do torneio',
    backLobby: 'Voltando pra sala de espera…',
    reconnecting: 'reconectando…',
    statusSent: '✅ enviou',
    statusVoted: '🗳️ votou',
    waitingTag: '⏳ entra na próxima',
    leftGame: '(saiu do jogo)',
    leave: '🚪 Sair da sala',
    rankingTitle: '🏆 Ranking geral',
    noRanking: 'Ainda não tem ninguém no ranking — joga a primeira partida!',
    winsLabel: '{n}× campeão',
    spectNotice: '⏳ Rodada em andamento — você joga na próxima!',
    changeLangLocked: 'Pra trocar de idioma, sai da sala primeiro.',
    waitRound: 'Você entra na próxima rodada!',
    needName: 'Escolhe um nome aí!',
    nameTaken: 'Já tem alguém com esse nome na sala.',
    minPlayers: 'Precisa de pelo menos {n} jogadores.',
    wordCount: 'A frase precisa ter exatamente {n} palavras (uma pra cada letra).',
    wordLetter: 'A palavra {i} ("{word}") precisa começar com {letter}.',
    selfVote: 'Votar em si mesmo não vale, belesma!',
  },
  en: {
    tagline: 'a theme + random letters → the most creative phrase wins',
    askName: 'What should we call you?',
    namePh: 'Your name',
    join: 'Join',
    roomHint: '🇺🇸 You are joining the English room — switch the language up top before joining.',
    lobbyTitle: 'Waiting room',
    start: 'Start tournament (5 rounds)',
    waitingPlayers: 'Waiting for more players… (minimum 2)',
    shareHint: 'Share the link with your friends — you can join even mid-game.',
    round: 'Round {r} of {t}',
    roundVoting: 'Round {r} of {t} — voting',
    roundResults: 'Round {r} of {t} — results',
    phrasePh: 'Type your phrase here…',
    orderHint: 'Each word starts with the letters, in order',
    submit: 'Submit phrase',
    sent: '✅ Phrase sent! Waiting for the others…',
    playersTitle: 'Players',
    voteHint: "Vote for the best phrase (your own doesn't count 😄)",
    yours: "this one's yours 😉",
    yourVote: 'your vote ✅',
    by: 'by',
    vote1: 'vote',
    voteN: 'votes',
    scoreTitle: 'Scoreboard',
    nobody: '😴 Nobody submitted a phrase this round…',
    championTitle: 'Tournament champion',
    backLobby: 'Back to the waiting room…',
    reconnecting: 'reconnecting…',
    statusSent: '✅ sent',
    statusVoted: '🗳️ voted',
    waitingTag: '⏳ joins next round',
    leftGame: '(left the game)',
    leave: '🚪 Leave room',
    rankingTitle: '🏆 All-time ranking',
    noRanking: 'Nobody in the ranking yet — play the first game!',
    winsLabel: '{n}× champion',
    spectNotice: "⏳ Round in progress — you'll play in the next one!",
    changeLangLocked: 'To change language, leave the room first.',
    waitRound: "You'll join in the next round!",
    needName: 'Pick a name!',
    nameTaken: 'Someone in the room already has that name.',
    minPlayers: 'You need at least {n} players.',
    wordCount: 'The phrase must have exactly {n} words (one per letter).',
    wordLetter: 'Word {i} ("{word}") must start with {letter}.',
    selfVote: "Voting for yourself doesn't count!",
  },
};

let lang = localStorage.getItem('acromania_lang') || (navigator.language?.startsWith('pt') ? 'pt' : 'en');

function t(key, params) {
  let s = (I18N[lang] && I18N[lang][key]) || I18N.pt[key] || key;
  if (params) for (const [k, v] of Object.entries(params)) s = s.replace(`{${k}}`, v);
  return s;
}

function themeText(theme) {
  if (!theme) return '';
  return typeof theme === 'string' ? theme : (theme[lang] || theme.pt);
}

function applyStatic() {
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
  document.querySelectorAll('[data-i18n]').forEach((el) => { el.textContent = t(el.dataset.i18n); });
  $('name').placeholder = t('namePh');
  $('phrase').placeholder = t('phrasePh');
  $('conn').textContent = t('reconnecting');
  $('btn-leave').textContent = t('leave');
  $('lang-pt').classList.toggle('active', lang === 'pt');
  $('lang-en').classList.toggle('active', lang === 'en');
}

function setLang(l) {
  if (joined) return showError(t('changeLangLocked')); // dentro da sala não troca
  lang = l;
  localStorage.setItem('acromania_lang', l);
  applyStatic();
}

// ------------------------------------------------------------------ jogo
const $ = (id) => document.getElementById(id);
let ws = null;
let state = null;
let myName = localStorage.getItem('acromania_name') || '';
let joined = false;
let clockSkew = 0;

$('name').value = myName;
$('lang-pt').onclick = () => setLang('pt');
$('lang-en').onclick = () => setLang('en');
applyStatic();

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => {
    $('conn').classList.remove('show');
    if (joined && myName) ws.send(JSON.stringify({ type: 'join', name: myName, lang }));
  };
  ws.onclose = () => {
    $('conn').classList.add('show');
    setTimeout(connect, 1500);
  };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'error') return showError(t(msg.code, msg.params));
    if (msg.type === 'left') {
      joined = false;
      state = null;
      updateTopbar();
      return show('s-join');
    }
    if (msg.type === 'state') {
      const prevPhase = state?.phase;
      state = msg;
      clockSkew = msg.now - Date.now();
      render(prevPhase);
    }
  };
}
connect();

function sendMsg(m) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(m)); }

function showError(text) {
  const map = { 'lobby': 'err-lobby', 'writing': 'err-write', 'voting': 'err-vote' };
  const id = joined ? (map[state?.phase] || 'err-lobby') : 'err-join';
  const el = $(id);
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

function updateTopbar() {
  $('langbar').classList.toggle('locked', joined);
  $('btn-leave').classList.toggle('show', joined);
}

// ---- join / leave
$('btn-join').onclick = join;
$('name').addEventListener('keydown', (e) => { if (e.key === 'Enter') join(); });
function join() {
  const name = $('name').value.trim();
  if (!name) return showError(t('needName'));
  myName = name;
  localStorage.setItem('acromania_name', name);
  joined = true;
  updateTopbar();
  sendMsg({ type: 'join', name, lang });
}

$('btn-leave').onclick = () => sendMsg({ type: 'leave' });
$('btn-start').onclick = () => sendMsg({ type: 'start' });

// ---- escrita
$('btn-submit').onclick = submitPhrase;
$('phrase').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPhrase(); });
$('phrase').addEventListener('input', paintLetterFeedback);
function submitPhrase() {
  sendMsg({ type: 'submit', text: $('phrase').value });
}

function normalizeWord(w) {
  return w.normalize('NFD').replace(/[̀-ͯ]/g, '').toUpperCase().replace(/[^A-Z]/g, '');
}

function paintLetterFeedback() {
  if (!state || state.phase !== 'writing') return;
  const words = $('phrase').value.trim().split(/\s+/).filter(Boolean);
  [...$('w-letters').children].forEach((el, i) => {
    el.classList.remove('ok', 'bad');
    if (i < words.length) {
      const first = normalizeWord(words[i])[0];
      el.classList.add(first === state.letters[i] ? 'ok' : 'bad');
    }
  });
}

// ---- votação (delegação)
$('v-entries').onclick = (e) => {
  if (state?.youSpectator) return;
  const el = e.target.closest('.entry');
  if (!el || el.classList.contains('mine') || el.classList.contains('locked')) return;
  sendMsg({ type: 'vote', idx: Number(el.dataset.idx) });
};

// ---- timer
setInterval(() => {
  if (!state || !state.endsAt) return;
  const left = Math.max(0, Math.ceil((state.endsAt - (Date.now() + clockSkew)) / 1000));
  const ids = { writing: 'w-timer', voting: 'v-timer', results: 'r-timer', final: 'f-timer' };
  const el = $(ids[state.phase] || '');
  if (!el) return;
  el.textContent = `${left}s`;
  el.classList.toggle('urgent', left <= 5 && (state.phase === 'writing' || state.phase === 'voting'));
}, 250);

// ---- render
function show(id) {
  document.querySelectorAll('.screen').forEach((s) => s.classList.remove('active'));
  $(id).classList.add('active');
}

function playerRows(containerId, showStatus) {
  const c = $(containerId);
  c.innerHTML = '';
  for (const p of state.players) {
    const div = document.createElement('div');
    div.className = 'prow' + (p.id === state.you.id ? ' me' : '');
    let status = '';
    if (p.waiting) status = `<span class="wait">${t('waitingTag')}</span>`;
    else if (showStatus === 'writing' && p.submitted) status = `<span class="status">${t('statusSent')}</span>`;
    else if (showStatus === 'voting' && p.voted) status = `<span class="status">${t('statusVoted')}</span>`;
    div.innerHTML = `<span>${esc(p.name)}${status}</span><span class="score">${p.score} pts</span>`;
    c.appendChild(div);
  }
}

function rankingRows(containerId) {
  const c = $(containerId);
  c.innerHTML = '';
  const list = state.ranking || [];
  if (!list.length) {
    c.innerHTML = `<div class="hint">${t('noRanking')}</div>`;
    return;
  }
  list.forEach((r, i) => {
    const medal = ['🥇', '🥈', '🥉'][i] || `${i + 1}º`;
    const isMe = joined && r.name.toLowerCase() === myName.toLowerCase();
    const wins = r.wins > 0 ? `<span class="wins">${t('winsLabel', { n: r.wins })}</span>` : '';
    const div = document.createElement('div');
    div.className = 'prow' + (isMe ? ' me' : '');
    div.innerHTML = `<span><span class="pos">${medal}</span>${esc(r.name)}${wins}</span><span class="score">${r.points} pts</span>`;
    c.appendChild(div);
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderLetters(containerId) {
  const c = $(containerId);
  c.innerHTML = '';
  for (const l of state.letters) {
    const div = document.createElement('div');
    div.className = 'letter';
    div.textContent = l;
    c.appendChild(div);
  }
}

function render(prevPhase) {
  if (!joined || !state) return show('s-join');

  if (state.phase === 'lobby') {
    show('s-lobby');
    playerRows('lobby-players');
    rankingRows('lobby-ranking');
    $('btn-start').disabled = state.players.length < 2;
    $('btn-start').textContent = state.players.length < 2 ? t('waitingPlayers') : t('start');
    return;
  }

  if (state.phase === 'writing') {
    show('s-writing');
    $('w-round').textContent = t('round', { r: state.round, t: state.totalRounds });
    $('w-theme').textContent = themeText(state.theme);
    if (prevPhase !== 'writing') {
      renderLetters('w-letters');
      $('phrase').value = '';
      paintLetterFeedback();
    }
    const spect = state.youSpectator;
    $('w-form').style.display = (!spect && !state.youSubmitted) ? 'block' : 'none';
    $('w-waiting').style.display = (!spect && state.youSubmitted) ? 'block' : 'none';
    $('w-spect').style.display = spect ? 'block' : 'none';
    playerRows('w-players', 'writing');
    return;
  }

  if (state.phase === 'voting') {
    show('s-voting');
    $('v-round').textContent = t('roundVoting', { r: state.round, t: state.totalRounds });
    $('v-theme').textContent = themeText(state.theme);
    $('v-hint').textContent = state.youSpectator ? t('spectNotice') : t('voteHint');
    const c = $('v-entries');
    c.innerHTML = '';
    for (const e of state.entries) {
      const div = document.createElement('div');
      const mine = e.idx === state.yourEntryIdx;
      const voted = e.idx === state.yourVote;
      div.className = 'entry' + (mine ? ' mine' : '') + (voted ? ' voted' : '') + (state.youSpectator ? ' locked' : '');
      div.dataset.idx = e.idx;
      div.innerHTML = `“${esc(e.text)}”` + (mine ? `<span class="tag">${t('yours')}</span>` : voted ? `<span class="tag">${t('yourVote')}</span>` : '');
      c.appendChild(div);
    }
    return;
  }

  if (state.phase === 'results') {
    show('s-results');
    $('r-round').textContent = t('roundResults', { r: state.round, t: state.totalRounds });
    $('r-theme').textContent = themeText(state.results.theme);
    const c = $('r-entries');
    c.innerHTML = '';
    if (state.results.nobody) {
      c.innerHTML = `<div class="card" style="text-align:center">${t('nobody')}</div>`;
    } else {
      const top = state.results.entries[0]?.votes || 0;
      for (const r of state.results.entries) {
        const div = document.createElement('div');
        div.className = 'result' + (r.votes === top && top > 0 ? ' winner' : '');
        const author = r.author ? esc(r.author) : t('leftGame');
        const voteWord = r.votes === 1 ? t('vote1') : t('voteN');
        div.innerHTML = `
          <div class="phrase">“${esc(r.text)}”</div>
          <div class="meta">
            <span>${t('by')} <b>${author}</b></span>
            <span>${r.votes} ${voteWord} · <span class="pts">+${r.points} pts</span></span>
          </div>`;
        c.appendChild(div);
      }
    }
    playerRows('r-players');
    return;
  }

  if (state.phase === 'final') {
    show('s-final');
    const podium = state.podium || [];
    $('f-champion').textContent = podium[0] ? podium[0].name : '—';
    const c = $('f-board');
    c.innerHTML = '';
    podium.forEach((p, i) => {
      const medal = ['🥇', '🥈', '🥉'][i] || `${i + 1}º`;
      const div = document.createElement('div');
      div.className = 'prow';
      div.innerHTML = `<span>${medal} ${esc(p.name)}</span><span class="score">${p.score} pts</span>`;
      c.appendChild(div);
    });
    rankingRows('f-ranking');
    return;
  }
}
</script>
</body>
</html>
